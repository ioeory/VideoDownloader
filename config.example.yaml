# VideoDownloader 配置示例
# 复制此文件为 config.yaml，按需修改

# 默认输出目录
output_dir: ./downloads

# 默认并发数（建议 1-3）
concurrent: 1

# 默认浏览器（用于自动提取 Cookie）
# 可选: chrome / chromium / firefox / edge / brave / safari / opera / vivaldi
browser: chrome

# 默认画质
# 可选: best / 1080p / 720p / 480p / audio
quality: best

# DeepLearning.AI 配置
deeplearning:
  # 默认课程 slug
  # default_course: ai-for-everyone
  # 默认下载全部 Week（留空下载全部）
  # weeks: [1, 2]

# 日志文件路径（留空则不写文件）
log_file: download.log
